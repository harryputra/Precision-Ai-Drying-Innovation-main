<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # WebSocket Laravel Reverb — same-origin: wss://domain/app/{key} → container reverb
    # (Cloudflare Tunnel meneruskan WebSocket; klien Echo cukup pakai domain halaman)
    ProxyPreserveHost On
    ProxyPass        "/app/" "ws://reverb:8080/app/"
    ProxyPassReverse "/app/" "ws://reverb:8080/app/"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
